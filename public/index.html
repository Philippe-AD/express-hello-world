<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#f8fafc; --surface:#ffffff; --border:#e2e8f0;
      --text:#0f172a; --muted:#64748b; --light:#94a3b8;
      --accent:#3ecf8e; --radius:12px;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
      --shadow-md:0 4px 16px rgba(0,0,0,.10);
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
    header { height:56px; background:var(--surface); border-bottom:1px solid var(--border); padding:0 28px; display:flex; align-items:center; justify-content:space-between; }
    .logo { display:flex; align-items:center; gap:10px; font-size:15px; font-weight:600; text-decoration:none; color:var(--text); }
    .logo-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); }
    .status-pill { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); background:var(--bg); border:1px solid var(--border); padding:4px 12px; border-radius:99px; }
    .dot-green { width:7px; height:7px; border-radius:50%; background:#22c55e; }
    .hero { padding:56px 28px 40px; text-align:center; }
    .hero h1 { font-size:32px; font-weight:700; letter-spacing:-.02em; margin-bottom:12px; }
    .hero p { font-size:15px; color:var(--muted); max-width:440px; margin:0 auto; line-height:1.6; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:16px; max-width:900px; margin:0 auto; padding:0 28px 60px; width:100%; min-height:160px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px; text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:14px; transition:box-shadow .15s,transform .15s,border-color .15s; position:relative; overflow:hidden; }
    .card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:var(--card-color,var(--accent)); opacity:0; transition:opacity .15s; }
    .card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); border-color:#c8d9e8; }
    .card:hover::after { opacity:1; }
    .card-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .card-icon svg { width:20px; height:20px; }
    .card-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:2px; }
    .card h2 { font-size:16px; font-weight:600; }
    .card p { font-size:13px; color:var(--muted); line-height:1.55; flex:1; }
    .card-arrow { display:flex; align-items:center; gap:4px; font-size:12px; font-weight:500; color:var(--card-color,var(--accent)); margin-top:4px; }
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; grid-column:1/-1; padding:40px; color:var(--light); }
    .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .65s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    footer { margin-top:auto; padding:20px 28px; text-align:center; font-size:12px; color:var(--light); border-top:1px solid var(--border); }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/"><span class="logo-dot"></span>Dashboard</a>
  <div class="status-pill"><span class="dot-green"></span>En ligne</div>
</header>
<section class="hero">
  <h1>Bienvenue &#128075;</h1>
  <p>Selectionnez un outil pour commencer.</p>
</section>
<div class="grid" id="grid">
  <div class="loading"><div class="spinner"></div><span>Chargement...</span></div>
</div>
<footer>calmtechnology.ch &mdash; Node.js / Express / Supabase</footer>
<script>
const ICONS = {
  database: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>',
  mail: '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
  edit: '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>',
  chart: '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
  users: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  globe: '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
  file: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
  star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  lock: '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
};

function icon(name, color) {
  const p = ICONS[name] || ICONS.globe;
  return `<svg viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.7">${p}</svg>`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadPages() {
  const grid = document.getElementById('grid');
  try {
    const res = await fetch('/api/pages');
    if (!res.ok) throw new Error();
    const pages = await res.json();
    if (!pages.length) {
      grid.innerHTML = '<div class="loading"><p>Aucune page configuree.</p></div>';
      return;
    }
    grid.innerHTML = pages.map(p => `
      <a class="card" href="${esc(p.url)}" style="--card-color:${esc(p.color)};--card-bg:${esc(p.bg_color)};">
        <div class="card-icon" style="background:${esc(p.bg_color)};">
          ${icon(p.icon, p.color)}
        </div>
        <div>
          <div class="card-label">${esc(p.url.replace('/', '').toUpperCase() || 'PAGE')}</div>
          <h2>${esc(p.title)}</h2>
        </div>
        <p>${esc(p.description)}</p>
        <div class="card-arrow">
          Ouvrir
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>`).join('');
  } catch {
    grid.innerHTML = '<div class="loading"><p>Erreur de chargement des pages.</p></div>';
  }
}

loadPages();
</script>
</body>
</html>
