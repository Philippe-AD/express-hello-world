<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion des pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--light:#94a3b8;--accent:#6366f1;--accent-dk:#4f46e5;--danger:#ef4444;--danger-bg:#fef2f2;--success:#22c55e;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08)}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:14px}
    header{height:54px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;text-decoration:none;color:var(--text)}
    .logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
    .back{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:5px}
    .back:hover{color:var(--text)}
    main{flex:1;padding:28px;max-width:860px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:20px}
    .page-title{display:flex;align-items:center;justify-content:space-between}
    .page-title h1{font-size:22px;font-weight:700}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
    .btn:hover{background:var(--bg)}
    .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-dk);border-color:var(--accent-dk)}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-del:hover{background:var(--danger-bg);border-color:#fca5a5;color:var(--danger)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead{position:sticky;top:0;z-index:2}
    th{background:#f1f5f9;padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:9px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafcfe}
    .swatch{width:22px;height:22px;border-radius:5px;display:inline-block;border:1px solid rgba(0,0,0,.08)}
    .badge-on{background:#dcfce7;color:#15803d;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
    .badge-off{background:#f1f5f9;color:var(--light);font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
    .row-acts{display:flex;gap:4px}
    .state{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--light);font-size:13px}
    .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
    .overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border-radius:12px;width:480px;max-width:calc(100vw - 32px);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.18);transform:translateY(10px) scale(.97);transition:transform .2s}
    .overlay.open .modal{transform:none}
    .modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-head h3{font-size:15px;font-weight:600}
    .close-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .12s}
    .close-btn:hover{background:var(--bg);color:var(--text)}
    .modal-body{padding:18px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:13px}
    .field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
    .field input[type=text],.field input[type=number],.field input[type=url],.field textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--surface);transition:border-color .15s,box-shadow .15s}
    .field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
    .field textarea{resize:vertical;min-height:64px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .color-row{display:flex;align-items:center;gap:8px}
    .color-row input[type=color]{width:36px;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:none}
    .color-row span{font-size:12px;color:var(--muted)}
    .icon-grid{display:flex;flex-wrap:wrap;gap:6px}
    .icon-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
    .icon-btn:hover{border-color:#a5b4fc;background:#eef2ff}
    .icon-btn.selected{border-color:var(--accent);background:#eef2ff;box-shadow:0 0 0 2px rgba(99,102,241,.2)}
    .icon-btn svg{width:16px;height:16px}
    .toggle-row{display:flex;align-items:center;gap:10px;font-size:13px}
    .toggle{position:relative;width:36px;height:20px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .slider{position:absolute;inset:0;background:#cbd5e1;border-radius:99px;cursor:pointer;transition:.2s}
    .slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
    .toggle input:checked + .slider{background:var(--accent)}
    .toggle input:checked + .slider::before{transform:translateX(16px)}
    .modal-foot{padding:12px 20px 18px;display:flex;justify-content:flex-end;gap:8px}
    #toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:100}
    .toast{padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:slideUp .25s ease;max-width:280px}
    .toast.success{background:#14532d;color:#bbf7d0}
    .toast.error{background:#7f1d1d;color:#fecaca}
    @keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
  </style>
</head>
<body>
<header>
  <div class="logo"><span class="logo-dot"></span>Gestion des pages</div>
  <a class="back" href="/">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Dashboard
  </a>
</header>
<main>
  <div class="page-title">
    <h1>Pages du dashboard</h1>
    <button class="btn btn-primary" id="addBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Ajouter
    </button>
  </div>
  <div class="card">
    <div id="content"><div class="state"><div class="spinner"></div></div></div>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Ajouter une page</h3>
      <button class="close-btn" id="closeBtn">x</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="field"><label>Titre</label><input type="text" id="f-title" placeholder="Mon outil" /></div>
      <div class="field"><label>Description</label><textarea id="f-description" placeholder="Ce que fait cette page..."></textarea></div>
      <div class="field"><label>URL</label><input type="text" id="f-url" placeholder="/mon-outil" /></div>
      <div class="row2">
        <div class="field">
          <label>Couleur accent</label>
          <div class="color-row">
            <input type="color" id="f-color" value="#3ecf8e" />
            <span id="color-val">#3ecf8e</span>
          </div>
        </div>
        <div class="field">
          <label>Couleur fond</label>
          <div class="color-row">
            <input type="color" id="f-bg_color" value="#ecfdf5" />
            <span id="bg-val">#ecfdf5</span>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Icone</label>
        <div class="icon-grid" id="iconGrid"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Ordre (tri)</label><input type="number" id="f-sort_order" value="0" min="0" /></div>
        <div class="field" style="justify-content:flex-end;display:flex;flex-direction:column;">
          <label>Visible sur le dashboard</label>
          <div class="toggle-row">
            <label class="toggle"><input type="checkbox" id="f-active" checked /><span class="slider"></span></label>
            <span id="active-label">Visible</span>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="cancelBtn">Annuler</button>
      <button class="btn btn-primary" id="saveBtn">Enregistrer</button>
    </div>
  </div>
</div>
<div id="toasts"></div>
<script>
const ICONS = {
  database:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>',
  mail:'<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>',
  chart:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  globe:'<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
  star:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  lock:'<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
};

let editingId = null;
let selectedIcon = 'globe';

function getToken() { return sessionStorage.getItem('api_token') || ''; }
function authHeaders(extra={}) {
  const t = getToken();
  return t ? { 'Authorization': `Bearer ${t}`, ...extra } : { ...extra };
}
(function() {
  if (!sessionStorage.getItem('api_token')) {
    const t = prompt('Token API :');
    if (t) sessionStorage.setItem('api_token', t);
  }
})();

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function svgIcon(name, color='currentColor', size=16) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.7">${ICONS[name]||ICONS.globe}</svg>`;
}

// Remplir grille d icones
const grid = document.getElementById('iconGrid');
Object.keys(ICONS).forEach(name => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'icon-btn' + (name === 'globe' ? ' selected' : '');
  btn.dataset.icon = name;
  btn.title = name;
  btn.innerHTML = svgIcon(name);
  btn.addEventListener('click', () => {
    document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedIcon = name;
  });
  grid.appendChild(btn);
});

// Color inputs
document.getElementById('f-color').addEventListener('input', e => {
  document.getElementById('color-val').textContent = e.target.value;
});
document.getElementById('f-bg_color').addEventListener('input', e => {
  document.getElementById('bg-val').textContent = e.target.value;
});
document.getElementById('f-active').addEventListener('change', e => {
  document.getElementById('active-label').textContent = e.target.checked ? 'Visible' : 'Cache';
});

// Charger les pages
async function loadPages() {
  const content = document.getElementById('content');
  try {
    const res = await fetch('/api/pages/all', { headers: authHeaders() });
    if (res.status === 401) { content.innerHTML = '<div class="state">Token invalide. Rechargez la page.</div>'; return; }
    const pages = await res.json();
    if (!pages.length) { content.innerHTML = '<div class="state">Aucune page. Ajoutez-en une.</div>'; return; }
    content.innerHTML = `<table>
      <thead><tr>
        <th>#</th><th>Titre</th><th>URL</th><th>Couleurs</th><th>Icone</th><th>Statut</th><th></th>
      </tr></thead>
      <tbody>
        ${pages.map(p => `<tr>
          <td style="color:var(--light)">${p.sort_order}</td>
          <td><strong>${esc(p.title)}</strong><br><span style="color:var(--light);font-size:12px">${esc(p.description).slice(0,50)}${p.description.length>50?'...':''}</span></td>
          <td style="font-family:monospace;font-size:12px">${esc(p.url)}</td>
          <td><span class="swatch" style="background:${esc(p.color)}" title="${esc(p.color)}"></span> <span class="swatch" style="background:${esc(p.bg_color)}" title="${esc(p.bg_color)}"></span></td>
          <td>${svgIcon(p.icon, p.color)}</td>
          <td><span class="${p.active ? 'badge-on' : 'badge-off'}">${p.active ? 'Visible' : 'Cache'}</span></td>
          <td><div class="row-acts">
            <button class="btn btn-sm" onclick="openEdit(${p.id})">Modifier</button>
            <button class="btn btn-sm btn-del" onclick="deletePage(${p.id})">Suppr.</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
    window._pages = pages;
  } catch { content.innerHTML = '<div class="state">Erreur de chargement.</div>'; }
}

function resetForm(p = null) {
  document.getElementById('f-title').value       = p ? p.title       : '';
  document.getElementById('f-description').value = p ? p.description : '';
  document.getElementById('f-url').value          = p ? p.url         : '';
  document.getElementById('f-color').value        = p ? p.color       : '#3ecf8e';
  document.getElementById('f-bg_color').value     = p ? p.bg_color    : '#ecfdf5';
  document.getElementById('f-sort_order').value   = p ? p.sort_order  : '0';
  document.getElementById('f-active').checked     = p ? p.active      : true;
  document.getElementById('color-val').textContent  = p ? p.color    : '#3ecf8e';
  document.getElementById('bg-val').textContent     = p ? p.bg_color : '#ecfdf5';
  document.getElementById('active-label').textContent = (p ? p.active : true) ? 'Visible' : 'Cache';
  selectedIcon = p ? p.icon : 'globe';
  document.querySelectorAll('.icon-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.icon === selectedIcon);
  });
}

function openAdd() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Ajouter une page';
  resetForm();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-title').focus();
}

function openEdit(id) {
  const p = (window._pages || []).find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Modifier la page';
  resetForm(p);
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

document.getElementById('addBtn').addEventListener('click', openAdd);
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

document.getElementById('saveBtn').addEventListener('click', async () => {
  const body = {
    title:       document.getElementById('f-title').value.trim(),
    description: document.getElementById('f-description').value.trim(),
    url:         document.getElementById('f-url').value.trim(),
    color:       document.getElementById('f-color').value,
    bg_color:    document.getElementById('f-bg_color').value,
    icon:        selectedIcon,
    active:      document.getElementById('f-active').checked,
    sort_order:  parseInt(document.getElementById('f-sort_order').value) || 0,
  };
  if (!body.title || !body.url) { toast('Titre et URL requis', 'error'); return; }
  const url    = editingId ? `/api/pages/${editingId}` : '/api/pages';
  const method = editingId ? 'PUT' : 'POST';
  try {
    const res = await fetch(url, { method, headers: authHeaders({'Content-Type':'application/json'}), body: JSON.stringify(body) });
    if (!res.ok) { const e = await res.json(); toast(e.error || 'Erreur', 'error'); return; }
    toast(editingId ? 'Page modifiee' : 'Page ajoutee', 'success');
    closeModal();
    loadPages();
  } catch { toast('Erreur reseau', 'error'); }
});

async function deletePage(id) {
  if (!confirm('Supprimer cette page ?')) return;
  try {
    const res = await fetch(`/api/pages/${id}`, { method:'DELETE', headers: authHeaders() });
    if (!res.ok) { toast('Erreur', 'error'); return; }
    toast('Page supprimee', 'success');
    loadPages();
  } catch { toast('Erreur reseau', 'error'); }
}

loadPages();
</script>
</body>
</html>
